services:
  postgres:
    image: postgres:17.2-bookworm
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: some_secret_password
      POSTGRES_DB: libraryplus
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d libraryplus"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8.3.1-noble
    restart: always
    volumes:
      - db:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: some_secret_password
    command: mongod --quiet --logpath /dev/null 
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=miniouser
      - MINIO_ROOT_PASSWORD=miniopass
      - MINIO_DEFAULT_BUCKETS=library-plus
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: "curl -k -f http://127.0.0.1:9001/minio/health/live || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 miniouser miniopass &&
      mc mb local/library-plus || true &&
      mc anonymous set download local/library-plus/covers || true &&
      mc anonymous set download local/library-plus/avatars || true
      "
    
  ai:
    image: ollama/ollama:0.30.6
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "ollama serve & sleep 3 && ollama pull qwen2.5:1.5b && wait"


  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      ai:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    environment:
      - API_URL=http://backend:8080/api/v1
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "5001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db:
  pg_data:
  minio_data:
  ollama_data:
    driver: local
