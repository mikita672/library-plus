services:
  mongo:
    image: mongo:8.3.1-noble
    restart: always
    volumes:
      - db:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: some_secret_password
    command: mongod --quiet --logpath /dev/null 
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=miniouser
      - MINIO_ROOT_PASSWORD=miniopass
      - MINIO_DEFAULT_BUCKETS=library-plus
    volumes:
      - minio_data:/data
    networks:
      - minio_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: "curl -k -f http://127.0.0.1:9001/minio/health/live || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8080/api/v1
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db:
  minio_data:
    driver: local

networks:
  minio_network:
    driver: bridge
