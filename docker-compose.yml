services:
  postgres:
    image: postgres:17.2-bookworm
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: some_secret_password
      POSTGRES_DB: libraryplus
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d libraryplus"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8.3.1-noble
    restart: always
    volumes:
      - db:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: some_secret_password
    command: mongod --quiet --logpath /dev/null 
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    environment:
      - API_URL=http://backend:8080/api/v1
    ports:
      - "5001:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db:
  pg_data:
